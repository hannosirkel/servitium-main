---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servitium
  labels:
    app.kubernetes.io/name: servitium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: servitium
  template:
    metadata:
      labels:
        app.kubernetes.io/name: servitium
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: servitium
          image: ghcr.io/hannosirkel/servitium
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_HOST
              value: mysql.mysql.svc.cluster.local
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: servitium
            - name: MYSQL_USER
              value: servitium
          ports:
            - name: http
              containerPort: 8099
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts:
            - name: servitium-secrets
              mountPath: /run/secrets/servitium
              readOnly: true
      volumes:
        - name: servitium-secrets
          secret:
            secretName: servitium-secrets
            defaultMode: 256
            items:
              - key: bot-token
                path: discord-bot-token
              - key: password
                path: mysql-password
